name: Hourly & Daily Ingest

on:
  schedule:
    - cron: '30 12 * * *'   # 12:30 UTC = 18:00 IST (safe window)

  workflow_dispatch:
    inputs:
      date:
        description: 'Date to ingest (YYYY-MM-DD)'
        required: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "date=$(TZ=Asia/Kolkata date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi
          echo "hour=$(TZ=Asia/Kolkata date +%H:00)" >> $GITHUB_OUTPUT
          echo "yesterday=$(TZ=Asia/Kolkata date -d yesterday +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Fetch Snapshot (Hourly)
        run: |
          curl -sf --max-time 60 \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_PRODUCTION_URL }}/api/fetch-snapshot?date=${{ steps.date.outputs.date }}&snapshot=${{ steps.date.outputs.hour }}" || true

      - name: Fetch CEA RE data (11:00 IST)
        if: steps.date.outputs.hour == '11:00' || github.event_name == 'workflow_dispatch'
        run: |
          curl -sf --max-time 60 \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_PRODUCTION_URL }}/api/fetch-cea-re?date=${{ steps.date.outputs.date }}" || true

      - name: Fetch NPP data (19:00 IST)
        if: steps.date.outputs.hour == '19:00' || github.event_name == 'workflow_dispatch'
        run: |
          curl -sf --max-time 60 \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_PRODUCTION_URL }}/api/fetch-npp?date=${{ steps.date.outputs.yesterday }}" || true
